name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test --workspaces --if-present
      - run: npm run build

  deploy-backend:
    name: Deploy backend to Elastic Beanstalk
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for AWS OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build -w backend

      # Deploy artifact is just the backend: compiled dist/ plus its own
      # production node_modules, installed standalone (not via the npm
      # workspace) so nothing from the frontend ends up on the EB instance.
      # .platform must sit at the zip root for EB to pick up its nginx/hook
      # overrides.
      - name: Assemble deploy package
        run: |
          mkdir deploy
          cp -r backend/dist deploy/dist
          cp backend/package.json deploy/package.json
          cp -r .platform deploy/.platform
          cd deploy
          npm install --omit=dev --no-audit --no-fund
          zip -rq ../eb-deploy.zip .

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ env.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ env.AWS_SESSION_TOKEN }}
          application_name: ${{ vars.EB_APPLICATION_NAME }}
          environment_name: ${{ vars.EB_ENVIRONMENT_NAME }}
          version_label: ${{ github.sha }}
          region: ${{ vars.AWS_REGION }}
          deployment_package: eb-deploy.zip
          existing_bucket_name: ${{ vars.EB_STORAGE_BUCKET }}
          wait_for_environment_recovery: 180

  deploy-frontend:
    name: Deploy frontend to S3 + CloudFront
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for AWS OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build -w frontend

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync frontend/dist "s3://${{ vars.FRONTEND_S3_BUCKET }}" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
